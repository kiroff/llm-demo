services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/entrypoint.sh
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      # Добави колкото модела искаш, разделени със запетая
      - OLLAMA_MODELS=llama3,gemma4,deepseek-r1,nomic-embed-text
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      kiroff:

volumes:
  ollama_data:


networks:
  kiroff:
    name: kiroff
    driver: bridge
    external: true